<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deputation Vacancies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="app-container">
        <header class="app-header">
            <div class="header-logo">
                <i data-lucide="building-2"></i>
                <h1><span class="gradient-text">DEPUTATION</span> VACANCIES</h1>
            </div>

            <div class="header-actions">
                <button id="favBtn" class="icon-btn" title="My Watchlist" type="button">
                    <i data-lucide="heart"></i>
                    <span id="favCount" class="fav-count">0</span>
                </button>
                <button id="themeToggle" class="icon-btn" title="Toggle Theme" type="button">
                    <i data-lucide="moon"></i>
                </button>
            </div>
        </header>

        <main class="main-layout">
            <aside class="filters-sidebar glass-panel">
                <div class="filters-header">
                    <h2><i data-lucide="filter"></i> Filters</h2>
                    <button id="clearFiltersBtn" class="text-btn" type="button">Clear All</button>
                </div>

                <div class="filter-group">
                    <label for="searchPost">Search</label>
                    <div class="input-icon">
                        <i data-lucide="search"></i>
                        <input type="text" id="searchPost" placeholder="Post, dept, keywords...">
                    </div>
                </div>

                <div class="filter-group">
                    <label for="filterMyPayLevel">My Pay Level</label>
                    <select id="filterMyPayLevel">
                        <option value="">Any Level</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filterLevel">Pay Level</label>
                    <select id="filterLevel">
                        <option value="">All Levels</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filterMinistry">Ministry</label>
                    <select id="filterMinistry">
                        <option value="">All Ministries</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filterLocation">Location</label>
                    <select id="filterLocation">
                        <option value="">All Locations</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filterStatus">Status</label>
                    <select id="filterStatus">
                        <option value="">All</option>
                        <option value="Active" selected>Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
            </aside>

            <section class="dashboard-content">
                <div class="kpi-grid" id="kpiGrid"></div>
                <div id="activeFilters" class="active-filters"></div>

                <div class="content-toolbar">
                    <div class="results-count" id="resultsCount">Loading vacancies...</div>
                    <div class="view-toggles">
                        <button id="btnTableView" class="view-btn active" type="button">
                            <i data-lucide="table-2"></i>
                        </button>
                        <button id="btnCardView" class="view-btn" type="button">
                            <i data-lucide="layout-grid"></i>
                        </button>
                    </div>
                </div>

                <div id="dataContainer" class="data-container view-table"></div>
            </section>
        </main>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content glass-panel">
            <button id="closeModal" class="modal-close" type="button">
                <i data-lucide="x"></i>
            </button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
